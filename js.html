<script>
const { createApp, ref, reactive, onMounted, computed, watch, nextTick } = Vue;

const runGas = (funcName, ...args) => {
    return new Promise((resolve, reject) => {
        if (typeof google === 'undefined') { 
            reject(new Error("ไม่พบ Google API")); 
            return; 
        }
        google.script.run
            .withSuccessHandler(res => res ? resolve(res) : reject(new Error("No response")))
            .withFailureHandler(err => reject(err))
            [funcName](...args);
    });
};

const app = createApp({
    setup() {
        // --- Core States ---
        const page = ref('login'); 
        const loginStep = ref(1);
        const otpInput = ref('');
        const otpMessage = ref('');
        const appVersion = "1.3.1 AI Edition"; // อัปเดตเวอร์ชัน 1.3.1 AI Edition
        
        // --- Security / Lock Screen ---
        const isLocked = ref(false);
        const lockPassword = ref('');
        const lockError = ref('');
        let afkTimeout = null;
        let sessionCheckInterval = null;

        // --- Theme ---
        const theme = ref('light'); 
        
        const isLoading = ref(false);
        const isDataLoading = ref(false);
        const isSpinning = ref(false);
        const isEditMode = ref(false);
        const viewMode = ref(false); 
        const isSidebarOpen = ref(true); 
        const isDashboardTopOpen = ref(true); 
        
        const showSettingsModal = ref(false);
        const showProfileModal = ref(false);
        
        const user = reactive({ 
            name: '', 
            position: '', 
            role: '', 
            username: '', 
            image: '' 
        });

        const systemConfig = reactive({ 
            logoUrl: 'https://drive.google.com/thumbnail?id=142CkRafzFxGXtCS5q5D0Iqct7rKr4HSA&sz=w200' 
        });
        
        const config = reactive({ years: [], selectedYear: '' });
        const formLogin = reactive({ username: '', password: '' });

        const stats = reactive({ total: 0, reported: 0, abnormal: 0 });
        const patients = ref([]);
        
        // --- Master Data ---
        const masterUnits = ref([]);
        const masterDistricts = ref([]);
        const masterAdequacy = ref([]);
        const masterCytoTechs = ref([]);
        const masterPathos = ref([]);
        
        const masterSquamous = ref([]);
        const masterGlandular = ref([]);
        const masterCat300 = ref([]); 

        const masterContras = [
            'ไม่ใช้ฮอร์โมน/ไม่คุมกำเนิด', 'กินยาคุมกำเนิด', 'ฉีดยาคุมกำเนิด', 
            'ทำหมัน', 'ฝังยาคุมกำเนิด', 'ใส่ห่วงคุมกำเนิด', 'ถุงยางอนามัย', 'อื่นๆ (ระบุ)'
        ];
        const masterPrevTx = [
            'Not treatment', 'Surgery', 'Radiation', 
            'Chemotherapy', 'Hormone', 'อื่น ๆ (ระบุ)'
        ];
        
        const masterOrganism = [
            '101 Trichomonas spp.', '102 Candida spp.', '103 Bacterial vaginosis', 
            '104 Actinomyces app.', '105 HSV', '109 Other organism'
        ];
        const masterNonNeo = [
            '121 Inflammation', '122 Radiation', '123 IUD', 
            '124 Glandular cells status post hysterectomy', '125 Atrophy'
        ];

        // --- Helper: Date Calculation for Defaults ---
        const getFirstDayOfMonth = () => {
            const date = new Date();
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-01`;
        };
        const getLastDayOfMonth = () => {
            const date = new Date();
            const lastDay = new Date(date.getFullYear(), date.getMonth() + 1, 0);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(lastDay.getDate()).padStart(2, '0')}`;
        };

        // --- Filter States (With New Defaults) ---
        const unitFilter = ref('All'); 
        const searchQuery = ref('');
        const statusFilter = ref('Pending'); // เปลี่ยน Default เป็น รอผล
        const dashDateStart = ref(getFirstDayOfMonth()); // Default ต้นเดือน
        const dashDateEnd = ref(getLastDayOfMonth()); // Default ปลายเดือน

        const defaultForm = {
            rowId: '', cytoNo: '', cytoNoPreview: '',
            hn: '', cid: '', prefix: '', fname: '', lname: '', age: '', sex: 'หญิง',
            specimenDate: '', receivedDate: '', 
            unit: '', district: '', hcode: '', coordinator: '', phone: '',
            para: '', last: '', lmp: '', contraception: '', 
            prevTx: '', lastPap: '', clinFind: '', 
            clinDx: '', method: '', registerName: ''
        };
        
        const formReg = reactive({ ...defaultForm });
        const prefixes = ['นางสาว', 'นาง', 'นาย', 'เด็กหญิง', 'เด็กชาย', 'พระภิกษุ'];

        const ui = reactive({
            searchContra: '', showContraList: false, contraOtherText: '',
            showPrevTxList: false, prevTxSelections: [], prevTxOtherText: '',
            lmpType: 'ระบุวันที่', lmpDate: '',
            reportDateStart: getFirstDayOfMonth(), // Default ต้นเดือน
            reportDateEnd: getLastDayOfMonth(), // Default ปลายเดือน
            reportSearch: '',
            reportAdditionalOther: '',
            showPatientInfo: false,
            showOrganismList: false, 
            showNonNeoList: false 
        });

        const formReport = reactive({ 
            rowId: '', cytoNo: '', patient: {}, 
            adequacy: '', adequacyDetail: '', additional: '',
            organismSelections: [], organismOtherText: '', 
            nonNeoSelections: [], 
            
            squamousMain: '',
            squamousSubSingle: '', 
            vainOption: '',        
            
            glandularMain: '',
            glandularSub: '',      

            cat300: '', comment: '',
            cytoName: '', cytoDate: '', cytoTime: '',
            hasPatho: false, pathoName: '', pathoDate: '', pathoTime: ''
        });

        // --- Preferences System (Save/Load Filters) ---
        const PREFS_KEY = 'cytoPrefs_v99';
        const loadPrefs = () => {
            try {
                const prefsStr = localStorage.getItem(PREFS_KEY);
                if (prefsStr) {
                    const p = JSON.parse(prefsStr);
                    // Load Year (Fall back to current Thai year if not found)
                    if (p.selectedYear && config.years.includes(p.selectedYear)) {
                        config.selectedYear = p.selectedYear;
                    } else {
                        const currentThaiYear = (new Date().getFullYear() + 543).toString();
                        if (config.years.includes(currentThaiYear)) config.selectedYear = currentThaiYear;
                    }
                    
                    if (p.statusFilter) statusFilter.value = p.statusFilter;
                    if (p.dashDateStart !== undefined) dashDateStart.value = p.dashDateStart;
                    if (p.dashDateEnd !== undefined) dashDateEnd.value = p.dashDateEnd;
                    if (p.reportDateStart !== undefined) ui.reportDateStart = p.reportDateStart;
                    if (p.reportDateEnd !== undefined) ui.reportDateEnd = p.reportDateEnd;
                } else {
                    const currentThaiYear = (new Date().getFullYear() + 543).toString();
                    if (config.years.includes(currentThaiYear)) config.selectedYear = currentThaiYear;
                }
            } catch(e) {}
        };

        const savePrefs = () => {
            const p = {
                selectedYear: config.selectedYear,
                statusFilter: statusFilter.value,
                dashDateStart: dashDateStart.value,
                dashDateEnd: dashDateEnd.value,
                reportDateStart: ui.reportDateStart,
                reportDateEnd: ui.reportDateEnd
            };
            localStorage.setItem(PREFS_KEY, JSON.stringify(p));
        };

        // Watch for changes to save preferences automatically
        watch([() => config.selectedYear, statusFilter, dashDateStart, dashDateEnd, () => ui.reportDateStart, () => ui.reportDateEnd], () => {
            if (page.value !== 'login') savePrefs();
        }, { deep: true });

        // --- Computed AI Smart Blur Condition Logic ---
        const hasData100 = computed(() => formReport.organismSelections.length > 0 || formReport.nonNeoSelections.length > 0 || !!formReport.organismOtherText || ui.showOrganismList || ui.showNonNeoList);
        const hasData200Sq = computed(() => !!formReport.squamousMain);
        const hasData200Gl = computed(() => !!formReport.glandularMain);
        const hasData300 = computed(() => !!formReport.cat300);
        const hasDataComment = computed(() => !!formReport.comment);

        watch(() => formReport.squamousMain, (newVal, oldVal) => {
             if(oldVal && newVal !== oldVal) {
                 formReport.squamousSubSingle = '';
                 formReport.vainOption = '';
             }
        });
        
        watch(() => formReport.squamousSubSingle, (newVal) => {
             if (newVal !== '241 SIL') {
                 formReport.vainOption = '';
             }
        });
        
        watch(() => formReport.glandularMain, (newVal, oldVal) => {
             if(oldVal && newVal !== oldVal) {
                 formReport.glandularSub = '';
             }
        });

        const changeTheme = (newTheme) => {
            theme.value = newTheme;
            document.documentElement.setAttribute('data-theme', newTheme);
            const savedStr = localStorage.getItem('cytoUser_v99');
            if (savedStr) {
                try {
                    const saved = JSON.parse(savedStr);
                    saved.theme = newTheme;
                    localStorage.setItem('cytoUser_v99', JSON.stringify(saved));
                } catch(e) {}
            }
        };

        // --- AFK / SESSION TIMEOUT LOGIC ---
        const AFK_LIMIT_MS = 25 * 60 * 1000; 
        const SESSION_LIMIT_MS = 60 * 60 * 1000; 

        const updateSessionActivity = () => {
            if (page.value === 'login' || isLocked.value) return;
            
            const savedUserStr = localStorage.getItem('cytoUser_v99');
            if (savedUserStr) {
                try {
                    const savedUser = JSON.parse(savedUserStr);
                    savedUser.lastActive = Date.now();
                    localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                } catch(e) {}
            }
        };

        const resetAfkTimer = () => {
            if (page.value === 'login') return;

            if (!isLocked.value) {
                updateSessionActivity(); 
                clearTimeout(afkTimeout);
                afkTimeout = setTimeout(() => { lockScreen(); }, AFK_LIMIT_MS); 
            }
        };

        const startSessionMonitor = () => {
            if (sessionCheckInterval) clearInterval(sessionCheckInterval);
            
            sessionCheckInterval = setInterval(() => {
                if (page.value === 'login') return;

                const savedUserStr = localStorage.getItem('cytoUser_v99');
                if (savedUserStr) {
                    try {
                        const savedUser = JSON.parse(savedUserStr);
                        const lastActive = savedUser.lastActive || 0;
                        const timeElapsed = Date.now() - lastActive;

                        if (timeElapsed > SESSION_LIMIT_MS) {
                            forceLogout(true); 
                        }
                    } catch(e) {}
                }
            }, 60000); 
        };

        const lockScreen = () => {
            if (page.value === 'login') return;
            isLocked.value = true;
            lockPassword.value = '';
            lockError.value = '';
            clearTimeout(afkTimeout);

            const savedUserStr = localStorage.getItem('cytoUser_v99');
            if (savedUserStr) {
                try {
                    const savedUser = JSON.parse(savedUserStr);
                    savedUser.isLocked = true; 
                    savedUser.lastActive = Date.now(); 
                    localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                } catch(e) {}
            }
        };

        const unlockScreen = async () => {
            if (!lockPassword.value) return;
            isLoading.value = true;
            lockError.value = '';
            try {
                const res = await runGas('apiVerifyPassword', user.username, lockPassword.value);
                if (res.status === 'success') {
                    isLocked.value = false;
                    
                    const savedUserStr = localStorage.getItem('cytoUser_v99');
                    if (savedUserStr) {
                        try {
                            const savedUser = JSON.parse(savedUserStr);
                            savedUser.isLocked = false; 
                            savedUser.lastActive = Date.now(); 
                            localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                        } catch(e) {}
                    }

                    resetAfkTimer();
                } else {
                    lockError.value = 'รหัสผ่านผิดพลาด ระบบกำลังออกจากระบบ...';
                    setTimeout(() => { forceLogout(); }, 1500);
                }
            } catch (e) {
                lockError.value = 'เกิดข้อผิดพลาดในการยืนยันตัวตน';
            } finally {
                isLoading.value = false;
            }
        };

        const handleMainScroll = (e) => {};
        const handleTableScroll = (e) => {
            if (page.value === 'statistics') {
                const scrollTop = e.target.scrollTop;
                if (scrollTop > 5 && isDashboardTopOpen.value) {
                    isDashboardTopOpen.value = false; 
                } 
                else if (scrollTop <= 0 && !isDashboardTopOpen.value) {
                    isDashboardTopOpen.value = true; 
                }
            }
        };

        // --- COMPUTED PROPERTIES ---
        const progressPercent = computed(() => {
            return stats.total === 0 ? 0 : Math.round((stats.reported / stats.total) * 100);
        });

        const canAccessReport = computed(() => {
            if (!user.position && !user.role) return false;
            if (user.role === 'Admin') return true;
            const pos = user.position || '';
            return pos.includes('นักเทคนิคการแพทย์') || pos.includes('นักวิทยาศาสตร์การแพทย์') || pos.includes('พยาธิแพทย์');
        });
        
        const tatOverview = computed(() => {
            let onTime = 0; 
            let late = 0; 
            let totalWithRecDate = 0;
            
            (patients.value || []).forEach(p => {
                if (p.recDate) {
                    const tatData = getTAT(p);
                    totalWithRecDate++;
                    if (tatData.days <= 14) {
                        onTime++; 
                    } else {
                        late++;
                    }
                }
            });
            
            return {
                onTime: onTime,
                late: late,
                total: totalWithRecDate,
                percentOnTime: totalWithRecDate === 0 ? 0 : Math.round((onTime/totalWithRecDate)*100)
            };
        });

        const unitStats = computed(() => {
            const map = {};
            (patients.value || []).forEach(p => {
                if(!map[p.unit]) {
                    map[p.unit] = { name: p.unit, total: 0, reported: 0 };
                }
                map[p.unit].total++;
                if(p.status === 'Reported') {
                    map[p.unit].reported++;
                }
            });
            return Object.values(map).sort((a,b) => b.total - a.total);
        });

        const squamousDetailOptions = computed(() => {
            if (!formReport.squamousMain) return [];
            const filtered = masterSquamous.value.filter(x => x.main === formReport.squamousMain && x.detail1);
            return [...new Set(filtered.map(x => x.detail1))];
        });

        const squamousSubDetailOptions = computed(() => {
            if (formReport.squamousSubSingle !== '241 SIL') return [];
            const filtered = masterSquamous.value.filter(x => x.detail1 === '241 SIL' && x.detail2);
            return [...new Set(filtered.map(x => x.detail2))];
        });

        const glandularDetailOptions = computed(() => {
            if (!formReport.glandularMain || formReport.glandularMain === '281 Endocervical adenocarcinoma in situ (AIS)') return [];
            const filtered = masterGlandular.value.filter(x => x.main === formReport.glandularMain && x.detail1);
            return [...new Set(filtered.map(x => x.detail1))];
        });

        const closeAllDropdowns = () => { 
            ui.showContraList = false; 
            ui.showPrevTxList = false; 
            ui.showOrganismList = false; 
            ui.showNonNeoList = false;
        };

        const selectContra = (val) => { 
            ui.searchContra = val; 
            ui.showContraList = false; 
        };

        const togglePrevTx = (item) => { 
            const idx = ui.prevTxSelections.indexOf(item); 
            if (idx > -1) {
                ui.prevTxSelections.splice(idx, 1); 
            } else {
                ui.prevTxSelections.push(item); 
            }
        };
        
        const toggleOrganism = (item) => { 
            const idx = formReport.organismSelections.indexOf(item); 
            if (idx > -1) {
                formReport.organismSelections.splice(idx, 1); 
            } else {
                formReport.organismSelections.push(item); 
            }
        };

        const toggleNonNeo = (item) => { 
            const idx = formReport.nonNeoSelections.indexOf(item); 
            if (idx > -1) {
                formReport.nonNeoSelections.splice(idx, 1); 
            } else {
                formReport.nonNeoSelections.push(item); 
            }
        };

        const getMethodColor = (val) => {
            if (val === 'Conventional cytology') return 'text-slate-600 bg-slate-100 px-2.5 py-1 rounded-md text-sm border theme-border font-bold';
            if (val === 'Liquid-based cytology') return 'text-indigo-600 bg-indigo-50 border border-indigo-200 px-2.5 py-1 rounded-md text-sm font-bold';
            if (val === 'Liquid-based cytology [HPV โครงการ]') return 'text-emerald-600 bg-emerald-50 border border-emerald-200 px-2.5 py-1 rounded-md text-sm font-bold';
            return 'text-slate-500 font-bold';
        };

        watch(() => formReg.prefix, (newVal) => {
            if (['นางสาว', 'นาง', 'เด็กหญิง'].includes(newVal)) {
                formReg.sex = 'หญิง';
            } else if (['นาย', 'เด็กชาย', 'พระภิกษุ'].includes(newVal)) {
                formReg.sex = 'ชาย';
            }
        });

        watch(() => page.value, async (newPage, oldPage) => {
            if (newPage === 'statistics' && oldPage !== 'statistics') {
                await fetchData();
                if (isDashboardTopOpen.value) {
                    await nextTick();
                    setTimeout(renderCharts, 150); 
                }
            }
        });

        const logoRef = ref(null);
        const isLogoPlaying = ref(true);
        const toggleLogo = () => {
            const img = logoRef.value; 
            if (!img) return;
            if (isLogoPlaying.value) {
                try {
                    const canvas = document.createElement('canvas'); 
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.naturalWidth || 200; 
                    canvas.height = img.naturalHeight || 200;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height); 
                    img.src = canvas.toDataURL(); 
                    isLogoPlaying.value = false;
                } catch(e) {}
            } else { 
                img.src = systemConfig.logoUrl; 
                isLogoPlaying.value = true; 
            }
        };

        const getTAT = (p) => {
            if (!p.recDate) return { days: 0, percent: 0, colorClass: 'bg-slate-300', statusText: 'รอข้อมูล' };
            const start = new Date(p.recDate);
            let end = new Date(); 
            
            if (p.status === 'Reported') {
                const reportDTStr = p.pathoDateTime ? p.pathoDateTime : p.cytoDateTime;
                const parsed = parseDateTimeString(reportDTStr);
                if(parsed.date) end = new Date(parsed.date);
            }
            
            start.setHours(0,0,0,0); 
            end.setHours(0,0,0,0);
            
            const diffTime = Math.abs(end - start);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            let percent = (diffDays / 14) * 100;
            if (percent > 100) percent = 100;
            
            let colorClass = 'bg-gradient-to-r from-emerald-400 via-emerald-200 to-emerald-400'; 
            if (diffDays >= 8 && diffDays <= 12) colorClass = 'bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-400'; 
            if (diffDays >= 13) colorClass = 'bg-gradient-to-r from-rose-500 via-red-300 to-rose-500'; 
            
            const dayText = diffDays <= 1 ? 'Day' : 'Days';
            
            return {
                days: diffDays,
                percent: percent,
                colorClass: colorClass,
                statusText: `${diffDays} ${dayText}`
            };
        };

        const filteredPatients = computed(() => {
            let list = patients.value || [];
            
            if (unitFilter.value !== 'All') {
                list = list.filter(p => p.unit === unitFilter.value);
            }
            if (statusFilter.value !== 'All') {
                list = list.filter(p => p.status === statusFilter.value);
            }
            if (dashDateStart.value) {
                list = list.filter(p => p.recDate && p.recDate >= dashDateStart.value);
            }
            if (dashDateEnd.value) {
                list = list.filter(p => p.recDate && p.recDate <= dashDateEnd.value);
            }

            if (!searchQuery.value) return list;
            const q = searchQuery.value.toLowerCase();
            return list.filter(p => {
                const searchString = (p.fname || "") + (p.lname || "") + (p.hn || "") + (p.cytoNo || "") + (p.cid || "");
                return searchString.toLowerCase().includes(q);
            });
        });

        const filteredReportPatients = computed(() => {
            let list = patients.value || [];
            if (unitFilter.value !== 'All') {
                list = list.filter(p => p.unit === unitFilter.value);
            }
            if (statusFilter.value !== 'All') {
                list = list.filter(p => p.status === statusFilter.value);
            }
            if (ui.reportDateStart) {
                list = list.filter(p => p.recDate && p.recDate >= ui.reportDateStart);
            }
            if (ui.reportDateEnd) {
                list = list.filter(p => p.recDate && p.recDate <= ui.reportDateEnd);
            }
            if (ui.reportSearch) {
                const q = ui.reportSearch.toLowerCase();
                list = list.filter(p => {
                    const fullName = (p.fname || "") + (p.lname || "");
                    return (p.cytoNo && p.cytoNo.toLowerCase().includes(q)) || 
                           (p.hn && p.hn.includes(q)) || 
                           fullName.toLowerCase().includes(q);
                });
            }
            return list;
        });

        const adequacyDetailOptions = computed(() => {
            return masterAdequacy.value.filter(x => x.group === formReport.adequacy);
        });
        
        const additionalOptions = computed(() => {
            return masterAdequacy.value.filter(x => x.group === 'Additional');
        });
        
        watch(() => formReport.adequacy, (newVal, oldVal) => { 
            if (oldVal && newVal !== oldVal) {
                formReport.adequacyDetail = ''; 
            }
        });

        let donutChart = null;
        const renderCharts = () => {
            if (page.value !== 'statistics' || !isDashboardTopOpen.value) return;
            const ctx = document.getElementById('statusChart');
            if(!ctx) return;
            
            if(donutChart) { 
                donutChart.destroy(); 
                donutChart = null; 
            }
            
            Chart.defaults.font.family = "'Sarabun', sans-serif";
            Chart.defaults.color = theme.value === 'dark' ? '#94a3b8' : '#64748b';
            
            const gradComplete = ctx.getContext('2d').createLinearGradient(0, 0, 0, 200);
            gradComplete.addColorStop(0, '#818cf8'); 
            gradComplete.addColorStop(1, '#c084fc'); 
            
            const gradPending = ctx.getContext('2d').createLinearGradient(0, 0, 0, 200);
            gradPending.addColorStop(0, '#fbbf24'); 
            gradPending.addColorStop(1, '#f97316'); 

            donutChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['รายงานผลแล้ว', 'รอรายงานผล'],
                    datasets: [{ 
                        data: [stats.reported, stats.total - stats.reported], 
                        backgroundColor: [gradComplete, gradPending], 
                        borderWidth: 0, 
                        hoverOffset: 8,
                        borderRadius: 10 
                    }]
                },
                options: { 
                    circumference: 180, 
                    rotation: 270, 
                    cutout: '75%', 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { padding: 10, cornerRadius: 10 } 
                    },
                    animation: { 
                        animateScale: true, 
                        animateRotate: true,
                        duration: 1500, 
                        easing: 'easeOutQuart' 
                    }
                }
            });
        };

        watch([() => isDashboardTopOpen.value, () => theme.value], async ([newDashOpen, newTheme]) => { 
            if (page.value === 'statistics' && newDashOpen) {
                await nextTick();
                setTimeout(renderCharts, 150); 
            }
        });

        onMounted(() => {
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.contra-dropdown')) ui.showContraList = false;
                if (!e.target.closest('.prevtx-dropdown')) ui.showPrevTxList = false;
                if (!e.target.closest('.organism-dropdown')) ui.showOrganismList = false;
                if (!e.target.closest('.nonneo-dropdown')) ui.showNonNeoList = false;
            });

            window.addEventListener('mousemove', resetAfkTimer, { passive: true });
            window.addEventListener('keydown', resetAfkTimer, { passive: true });
            window.addEventListener('click', resetAfkTimer, { passive: true });

            try {
                const savedUser = localStorage.getItem('cytoUser_v99');
                if (savedUser) {
                    const parsed = JSON.parse(savedUser);
                    
                    if (parsed.lastActive && (Date.now() - parsed.lastActive > SESSION_LIMIT_MS)) {
                        localStorage.removeItem('cytoUser_v99');

        const parseDateTimeString = (dtStr) => {
            if (!dtStr) return { date: '', time: '' };
            try {
                if (dtStr.includes('GMT') || dtStr.includes('Z')) {
                    const d = new Date(dtStr);
                    if (!isNaN(d)) {
                        const pad = (n) => String(n).padStart(2, '0');
                        return { date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`, time: `${pad(d.getHours())}:${pad(d.getMinutes())}` };
                    }
                }
                const parts = dtStr.split(', ');
                if (parts.length !== 2) return { date: '', time: '' };
                const [dPart, tPart] = parts;
                const dateParts = dPart.split('/');
                if (dateParts.length !== 3) return { date: '', time: '' };
                const [day, month, year] = dateParts;
                const dateStr = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                const timeStr = tPart.substring(0, 5);
                return { date: dateStr, time: timeStr };
            } catch(e) { return { date: '', time: '' }; }
        };

            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64Data = e.target.result;
                isLoading.value = true;
                try {
                    let res;
                    if (type === 'profile') {
                        res = await runGas('apiSaveProfileImage', user.username, base64Data);
                    } else if (type === 'logo') {
                        res = await runGas('apiSaveSystemLogo', base64Data, user.username);
                    }

                    if (res && res.status === 'success') {
                        if (type === 'profile') {
                            user.image = res.url;
                            const savedUserStr = localStorage.getItem('cytoUser_v99');
                            if (savedUserStr) {
                                const savedUser = JSON.parse(savedUserStr);
                                savedUser.user.image = res.url;
                                localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                            }
                        } else if (type === 'logo') {
                            systemConfig.logoUrl = res.url;
                            const savedUserStr = localStorage.getItem('cytoUser_v99');
                            if (savedUserStr) {
                                const savedUser = JSON.parse(savedUserStr);
                                savedUser.systemLogo = res.url;
                                localStorage.setItem('cytoUser_v99', JSON.stringify(savedUser));
                            }
                        }
                        if (typeof Swal !== 'undefined') Swal.fire('สำเร็จ', 'อัปเดตรูปภาพเรียบร้อยแล้ว', 'success');
                    } else {
                        if (typeof Swal !== 'undefined') Swal.fire('ผิดพลาด', res.message, 'error');
                    }
                } catch (err) {
                    console.error(err);
                    if (typeof Swal !== 'undefined') Swal.fire('ผิดพลาด', 'เกิดข้อผิดพลาดในการเชื่อมต่อ', 'error');
                } finally {
                    isLoading.value = false;
                }
            };
            reader.readAsDataURL(file);
        };

        const openChangePassword = async () => {
            if (typeof Swal === 'undefined') return;
            const { value: newPassword } = await Swal.fire({
                title: 'เปลี่ยนรหัสผ่าน',
                input: 'password',
                inputLabel: 'รหัสผ่านใหม่',
                inputPlaceholder: 'กรอกรหัสผ่านใหม่ที่ต้องการ',
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                cancelButtonText: 'ยกเลิก',
                inputValidator: (value) => {
                    if (!value) {
                        return 'กรุณากรอกรหัสผ่าน!'
                    }
                    if (value.length < 4) {
                        return 'รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร!'
                    }
                }
            });

            if (newPassword) {
                isLoading.value = true;
                try {
                    const res = await runGas('apiChangePassword', user.username, newPassword);
                    if (res && res.status === 'success') {
                        Swal.fire('สำเร็จ', 'รหัสผ่านส่วนตัวถูกเปลี่ยนแปลงแล้ว', 'success');
                    } else {
                        Swal.fire('ผิดพลาด', res.message, 'error');
                    }
                } catch (err) {
                    console.error(err);
                    Swal.fire('ผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
                } finally {
                    isLoading.value = false;
                }
            }
        };

        // --- EXPORT TO TEMPLATE ---
        return {
            page, loginStep, otpInput, otpMessage, appVersion,
            isLocked, lockPassword, lockError, unlockScreen, lockScreen,
            theme, changeTheme,
            isLoading, isDataLoading, isSpinning, isEditMode, viewMode, 
            isSidebarOpen, isDashboardTopOpen,
            showSettingsModal, showProfileModal,
            user, systemConfig, config, formLogin, stats, patients,
            masterUnits, masterDistricts, masterAdequacy, masterCytoTechs, masterPathos,
            masterSquamous, masterGlandular, masterCat300, masterContras, masterPrevTx,
            masterOrganism, masterNonNeo,
            unitFilter, searchQuery, statusFilter, dashDateStart, dashDateEnd,
            formReg, prefixes, ui, formReport,
            hasData100, hasData200Sq, hasData200Gl, hasData300, hasDataComment,
            progressPercent, canAccessReport, tatOverview, unitStats,
            squamousDetailOptions, squamousSubDetailOptions, glandularDetailOptions, adequacyDetailOptions, additionalOptions,
            filteredPatients, filteredReportPatients,
            closeAllDropdowns, selectContra, togglePrevTx, toggleOrganism, toggleNonNeo, getMethodColor,
            logoRef, isLogoPlaying, toggleLogo, getTAT,
            handleLoginStep1, handleLoginStep2, handleLogout, fetchData, getNextCytoPreview,
            openRegisterPage, openEditMode, openViewMode, submitRegister,
            openReportList, openReportForm, submitReport,
            handleImageUpload, openChangePassword, handleMainScroll, handleTableScroll
        };
    }
});

app.mount('#app');
</script>
